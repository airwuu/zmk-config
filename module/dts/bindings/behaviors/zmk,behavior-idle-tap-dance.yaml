description: Idle-gated two-key tap dance behavior

compatible: "zmk,behavior-idle-tap-dance"

include: two_param.yaml

properties:
  bindings:
    type: phandles
    required: true
  tapping-term-ms:
    type: int
    default: 180
  require-prior-idle-ms:
    type: int
    default: 350
  primary-param2:
    type: int
    default: 0
  secondary-param2:
    type: int
    default: 0
